<body>
    <header>
        <h1>My Coastal Writing Corner</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>

            <a href="newsletter.html">Newsletter</a>

    <main>
        <section class="contact-intro">
            <h2>Get in Touch</h2>
            <p>I'd love to hear from you! Whether you have, questions, ideas, or just want to say hello, send me a message below.</p>
        </section>

        <section class="contact-form-section">
            <form action="mailto:youremail@example.com" method="post" enctype="text/plain" class="contact-from">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="6" required></textarea>

                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <footer>

    </footer>
</body>
